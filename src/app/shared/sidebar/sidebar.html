<button class="mobile-toggle" (click)="toggleMenu()">
  <i class="fa-solid" [class.fa-bars]="!isMenuOpen()" [class.fa-xmark]="isMenuOpen()"></i>
</button>

<aside class="sidebar" [class.mobile-active]="isMenuOpen()">

  <div class="sidebar-brand">
    <div class="brand-logo-container" style="display: flex; align-items: center; padding: 15px;">
      <i class="fa-brands fa-neos fa-fade" style="color: rgb(6, 255, 52); font-size: 2.5rem;"></i>
      <span style="margin-left: 12px; color: white; font-weight: 800; font-size: 1.5rem; letter-spacing: 1px;">
        NEO<span style="color: rgb(6, 255, 52);">BANK</span>
      </span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <a routerLink="/dashboard" class="nav-item" (click)="closeMenu()"
      [class.nav-item--active]="isActive('/dashboard')">
      <span class="nav-icon">▦</span> Dashboard
    </a>
    <a routerLink="/accounts" class="nav-item" (click)="closeMenu()"
      [class.nav-item--active]="isActive('/accounts')">
      <span class="nav-icon">◈</span> Accounts
    </a>
    <a routerLink="/profile" class="nav-item" (click)="closeMenu()"
      [class.nav-item--active]="isActive('/profile')">
      <span class="nav-icon">◎</span> Profile
    </a>
    @if (isAdmin()) {
      <a routerLink="/admin/users" class="nav-item" (click)="closeMenu()"
        [class.nav-item--active]="isActive('/admin')">
        <span class="nav-icon">⊞</span> All Users
        <span class="admin-badge">Admin</span>
      </a>
    }
  </nav>

  <div class="sidebar-user">
    <div class="sidebar-avatar">{{ userName().charAt(0).toUpperCase() }}</div>
    <div class="sidebar-user-info">
      <div class="sidebar-user-name">{{ userName() }}</div>
      <div class="sidebar-user-email">{{ userEmail() }}</div>
    </div>
  </div>

  <button class="logout-btn" (click)="logout()">Sign out</button>

</aside>

@if (isMenuOpen()) {
  <div class="sidebar-backdrop" (click)="closeMenu()"></div>
}
