<aside class="sidebar">

  <div class="sidebar-brand">
    <div class="brand-logo">N</div>
    <span class="brand-name">NeoBank</span>
  </div>

  <nav class="sidebar-nav">
    <a routerLink="/dashboard" class="nav-item"
      [class.nav-item--active]="isActive('/dashboard')">
      <span class="nav-icon">▦</span> Dashboard
    </a>
    <a routerLink="/accounts" class="nav-item"
      [class.nav-item--active]="isActive('/accounts')">
      <span class="nav-icon">◈</span> Accounts
    </a>
    <a routerLink="/profile" class="nav-item"
      [class.nav-item--active]="isActive('/profile')">
      <span class="nav-icon">◎</span> Profile
    </a>
    @if (isAdmin()) {
      <a routerLink="/admin/users" class="nav-item"
        [class.nav-item--active]="isActive('/admin')">
        <span class="nav-icon">⊞</span> All Users
        <span class="admin-badge">Admin</span>
      </a>
    }
  </nav>

  <div class="sidebar-user">
    <div class="sidebar-avatar">
      {{ userName().charAt(0).toUpperCase() }}
    </div>
    <div class="sidebar-user-info">
      <div class="sidebar-user-name">{{ userName() }}</div>
      <div class="sidebar-user-email">{{ userEmail() }}</div>
    </div>
  </div>

  <button class="logout-btn" (click)="logout()">
    Sign out
  </button>

</aside>
